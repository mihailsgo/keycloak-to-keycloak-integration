services:
  postgres:
    image: postgres:16-alpine
    container_name: kc-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: kc-test-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8081"
      KC_LOG_LEVEL: info
      TRUSTLYNX_CLIENT_SECRET: ${TRUSTLYNX_CLIENT_SECRET:?TRUSTLYNX_CLIENT_SECRET is required - copy .env.example to .env and fill it in}
    ports:
      - "8081:8081"
    volumes:
      - ./realm:/opt/keycloak/data/import-tpl:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        mkdir -p /opt/keycloak/data/import
        sed "s|REPLACE_ME_SECRET|${TRUSTLYNX_CLIENT_SECRET}|g" /opt/keycloak/data/import-tpl/test-realm.json > /opt/keycloak/data/import/test-realm.json
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm

volumes:
  postgres_data:
